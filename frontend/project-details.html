<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(45deg, rgba(255,107,107,0.8), rgba(78,205,196,0.8), rgba(69,183,209,0.8), rgba(249,202,36,0.8), rgba(108,92,231,0.8), rgba(255,235,59,0.8)), url('https://source.unsplash.com/featured/?algorithm') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .project-info {
            margin-bottom: 30px;
        }
        .tech-stack {
            background: rgba(249,202,36,0.8);
            color: #333;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .tech-stack h3 {
            margin-top: 0;
        }
        .tech-stack ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tech-stack li {
            background: #fff;
            padding: 5px 10px;
            border-radius: 3px;
            font-weight: bold;
        }
        button {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 20px;
        }
        button:hover {
            transform: scale(1.1);
            background: linear-gradient(45deg, #4ecdc4, #ff6b6b);
        }
        .loading { font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="projectTitle">Loading Project Details...</h1>
        <div id="projectContent" class="loading">Fetching project information...</div>
        <button onclick="window.history.back()">← Back to Portfolio</button>
    </div>

    <script>
        // Get project ID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        if (projectId) {
            // Fetch project details from backend
            fetch(`https://ba-35fd313ba5b74fefbf0d45b68c317141.ecs.us-east-1.on.aws/api/projects`)
                .then(response => response.json())
                .then(projects => {
                    const project = projects.find(p => p.id == projectId);
                    if (project) {
                        displayProject(project);
                    } else {
                        document.getElementById('projectContent').innerHTML = 'Project not found!';
                    }
                })
                .catch(error => {
                    console.error('Error fetching project:', error);
                    document.getElementById('projectContent').innerHTML = 'Failed to load project details. Make sure backend is running!';
                });
        } else {
            document.getElementById('projectContent').innerHTML = 'No project ID specified!';
        }

        function displayProject(project) {
            document.getElementById('projectTitle').textContent = project.title;

            const content = `
                <div class="project-info">
                    <p><strong>Description:</strong> ${project.description}</p>
                </div>
                <div class="tech-stack">
                    <h3>Technologies Used</h3>
                    <ul>
                        ${project.technologies.map(tech => `<li>${tech}</li>`).join('')}
                    </ul>
                </div>
                <div style="margin-top: 30px;">
                    <p><em>This is a demo project page. In a real application, you'd include screenshots, live demos, GitHub links, and more details here.</em></p>
                </div>
            `;

            document.getElementById('projectContent').innerHTML = content;
        }
    </script>
</body>
</html>
