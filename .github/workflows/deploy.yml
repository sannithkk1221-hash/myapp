on:
  push:
    branches:
      - main
 
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
 
jobs:
  deploy:
    runs-on: ubuntu-latest
 
    steps:
 
    - name: Checkout
      uses: actions/checkout@v4
 
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
 
    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
 
# ---------------- BACKEND ----------------
 
    - name: Build Backend Image
      run: |
        docker build -t backend ./backend
 
    - name: Tag Backend Image
      run: |
        docker tag backend:latest \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_BACKEND_REPO }}:latest
 
    - name: Push Backend Image
      run: |
        docker push \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_BACKEND_REPO }}:latest
 
    # - name: Deploy Backend ECS
    #   run: |
    #     aws ecs update-service \
    #       --cluster $ECS_CLUSTER \
    #       --service ${{ secrets.ECS_BACKEND_SERVICE }} \
    #       --force-new-deployment
 
 
# ---------------- FRONTEND ----------------
 
    - name: Build Frontend Image
      run: |
        docker build -t frontend ./frontend
 
    - name: Tag Frontend Image
      run: |
        docker tag frontend:latest \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_FRONTEND_REPO }}:latest
 
    - name: Push Frontend Image
      run: |
        docker push \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_FRONTEND_REPO }}:latest
 
    # - name: Deploy Frontend ECS
    #   run: |
    #     aws ecs update-service \
    #       --cluster $ECS_CLUSTER \
    #       --service ${{ secrets.ECS_FRONTEND_SERVICE }} \
    #       --force-new-deployment